schema = "axolync.repo/v1"

[repo]
id = "axolync-platform-wrapper"
roles = ["consumer", "consumable"]
display_name = "Axolync Platform Wrapper"
description = "Wrapper authority for Axolync desktop and mobile webview runtime shells."

[source]
git_url = "https://github.com/korenmic/axolync-platform-wrapper.git"
default_ref = "master"
local_dev_path_hint = "../axolync-platform-wrapper"

[bootstrap]
install_mode = "managed-clone"
install_root = ".axolync/repos"
readme = "README.md"
agent_docs = ["README.md", "config/wrapper-layout.json"]

[exports.tests]
full = "npm test"
smoke = "npm run proof:wrapper"

[exports.docs]
bootstrap = ["README.md"]
standards = ["config/wrapper-layout.json"]

[exports.wrapper_topology]
authority = "config/wrapper-layout.json"

[[exports.wrapper_topology.families]]
type = "mobile"
name = "capacitor"
path = "wrappers/mobile/capacitor"
project_root = "wrappers/mobile/capacitor/android"
native_companion_path = "wrappers/mobile/capacitor/android/app/src/main/kotlin/com/axolync/android"

[[exports.wrapper_topology.families]]
type = "desktop"
name = "tauri"
path = "wrappers/desktop/tauri"
workspace_template_path = "wrappers/desktop/tauri/workspace-template"
native_companion_path = "wrappers/desktop/tauri/workspace-template/src-tauri/src/native_service_companion.rs"

[[exports.wrapper_topology.families]]
type = "desktop"
name = "electron"
path = "wrappers/desktop/electron"
workspace_template_path = "wrappers/desktop/electron/workspace-template"
native_companion_path = "wrappers/desktop/electron/workspace-template/nativeServiceCompanionHost.cjs"

[[consumes.repos]]
id = "axolync-contract"
use = "schema-and-runtime-contracts"
required = true
source = "managed"

[[consumes.repos]]
id = "axolync-browser"
use = "browser-runtime"
required = true
source = "managed"
