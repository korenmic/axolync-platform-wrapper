name: Android CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: npm

    - name: Install Capacitor workspace dependencies
      run: npm ci --no-fund --no-audit
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run unit tests
      env:
        AXOLYNC_SKIP_BROWSER_ASSET_SYNC: "true"
      run: ./gradlew test --console=plain
    
    - name: Run lint
      env:
        AXOLYNC_SKIP_BROWSER_ASSET_SYNC: "true"
      run: ./gradlew lint --console=plain
      continue-on-error: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: app/build/test-results/
    
    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results*.html

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: npm

    - name: Install Capacitor workspace dependencies
      run: npm ci --no-fund --no-audit
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK variants
      env:
        AXOLYNC_SKIP_BROWSER_ASSET_SYNC: "true"
      run: ./gradlew :app:assembleNormalDebug :app:assembleDemoDebug --console=plain

    - name: Upload debug APKs
      uses: actions/upload-artifact@v4
      with:
        name: debug-apks
        path: app/build/outputs/apk/**/**/*.apk
